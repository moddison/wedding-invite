<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f1e7" />
    <meta
      name="description"
      content="Приглашение на свадьбу Данила и Натальи."
    />
    <meta property="og:title" content="Данил и Наталья - приглашение на свадьбу" />
    <meta
      property="og:description"
      content="Будем рады разделить с вами наш первый семейный праздник."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/wedding-hero.png" />
    <title>Данил и Наталья - приглашение на свадьбу</title>
    <style>
      #loading {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #f7f1e7; color: #2e2a26;
        font-family: Georgia, serif; font-size: 18px; letter-spacing: 1px;
        transition: opacity 0.5s;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      #loading span { animation: pulse 1.5s infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading"><span>Идёт загрузка…</span></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
